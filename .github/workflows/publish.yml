name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build the package but skip nuget push'
        type: boolean
        default: false

permissions:
  contents: write       # gh release create writes the Release object
  id-token: write       # mint OIDC token for nuget.org trusted publishing
  attestations: write   # publish SLSA build provenance

jobs:
  publish:
    name: Pack & push to nuget.org
    runs-on: windows-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57  # v3.0.0

      - name: Setup NuGet
        uses: nuget/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123  # v4.0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $csproj = [xml](Get-Content etwlib.csproj)
          $projectVersion = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          Write-Host "csproj version: $projectVersion"

          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagVersion = $env:GITHUB_REF.Substring('refs/tags/v'.Length)
            Write-Host "tag version:    $tagVersion"
            if ($tagVersion -ne $projectVersion) {
              Write-Error "Tag version ($tagVersion) does not match csproj version ($projectVersion). Update etwlib.csproj <Version> before tagging."
              exit 1
            }
          }

          "version=$projectVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: nuget restore etwlib.sln

      - name: Build
        run: msbuild.exe etwlib.sln /nologo /nr:false /p:platform="Any CPU" /p:configuration="Release"

      - name: Test (library tests must pass before we ship)
        run: dotnet test UnitTests/UnitTests.csproj --no-build --no-restore --verbosity normal --configuration Release

      - name: Locate package
        id: package
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path bin/Release -Filter "etwlib.${{ steps.version.outputs.version }}.nupkg" -Recurse | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "Could not find etwlib.${{ steps.version.outputs.version }}.nupkg under bin/Release"
            exit 1
          }
          Write-Host "Package: $($pkg.FullName)"
          "path=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: etwlib-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Attest build provenance
        # Signs the .nupkg via Sigstore (keyless, uses the OIDC token).
        # Publishes an attestation to GitHub's transparency log that
        # consumers can verify with: gh attestation verify <nupkg> --repo lilhoser/etwlib
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.package.outputs.path }}

      - name: Acquire nuget.org access token via OIDC trusted publishing
        # The official NuGet/login action handles the OIDC handshake — fetches
        # the GitHub Actions OIDC token with the right audience, exchanges it
        # against nuget.org's token endpoint, and exposes a short-lived API
        # key (1-hour TTL) via outputs.NUGET_API_KEY.
        #
        # Prerequisite: register this workflow as a trusted publisher for the
        # 'etwlib' package on nuget.org (Username menu -> Trusted Publishing):
        #   - Repository owner: lilhoser
        #   - Repository:       etwlib
        #   - Workflow file:    publish.yml      (filename only — no path)
        #   - Environment:      production       (optional, recommended)
        #
        # NOTE: this step runs in dry_run mode too — that's the only way to
        # verify the trusted-publisher registration without committing to a
        # real release. Only the nuget push below is dry_run-gated.
        id: nuget_login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1.2.0
        with:
          # nuget.org profile name of the package owner (NOT email).
          # Hardcoded since etwlib's owner is publicly listed on nuget.org;
          # move to ${{ secrets.NUGET_USER }} if ownership changes.
          user: lilhoser

      - name: Push to nuget.org
        if: ${{ inputs.dry_run != true }}
        shell: pwsh
        run: |
          dotnet nuget push "${{ steps.package.outputs.path }}" `
            --source https://api.nuget.org/v3/index.json `
            --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" `
            --skip-duplicate

      - name: Create GitHub Release
        if: ${{ inputs.dry_run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create $env:GITHUB_REF_NAME `
            --title $env:GITHUB_REF_NAME `
            --generate-notes `
            "${{ steps.package.outputs.path }}"
