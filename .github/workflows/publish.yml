name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build the package but skip nuget push'
        type: boolean
        default: false

jobs:
  publish:
    name: Pack & push to nuget.org
    runs-on: windows-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $csproj = [xml](Get-Content etwlib.csproj)
          $projectVersion = $csproj.Project.PropertyGroup.Version | Where-Object { $_ } | Select-Object -First 1
          Write-Host "csproj version: $projectVersion"

          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagVersion = $env:GITHUB_REF.Substring('refs/tags/v'.Length)
            Write-Host "tag version:    $tagVersion"
            if ($tagVersion -ne $projectVersion) {
              Write-Error "Tag version ($tagVersion) does not match csproj version ($projectVersion). Update etwlib.csproj <Version> before tagging."
              exit 1
            }
          }

          "version=$projectVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: nuget restore etwlib.sln

      - name: Build
        run: msbuild.exe etwlib.sln /nologo /nr:false /p:platform="Any CPU" /p:configuration="Release"

      - name: Test (library tests must pass before we ship)
        # --no-build so we don't redundantly rebuild what msbuild already produced.
        # Target UnitTests.csproj explicitly instead of the solution to match the
        # fast path the CI workflow uses.
        run: dotnet test UnitTests/UnitTests.csproj --no-build --no-restore --verbosity normal --configuration Release

      - name: Locate package
        id: package
        shell: pwsh
        run: |
          $pkg = Get-ChildItem -Path bin/Release -Filter "etwlib.${{ steps.version.outputs.version }}.nupkg" -Recurse | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "Could not find etwlib.${{ steps.version.outputs.version }}.nupkg under bin/Release"
            exit 1
          }
          Write-Host "Package: $($pkg.FullName)"
          "path=$($pkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: etwlib-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Push to nuget.org
        if: ${{ inputs.dry_run != true }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: pwsh
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "NUGET_API_KEY secret is not configured in this repo. Add it under Settings → Secrets and variables → Actions."
            exit 1
          }
          dotnet nuget push "${{ steps.package.outputs.path }}" `
            --source https://api.nuget.org/v3/index.json `
            --api-key $env:NUGET_API_KEY `
            --skip-duplicate
